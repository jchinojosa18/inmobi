name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, mbstring, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: composer test

      - name: Run Pint
        run: composer pint:test

  deploy:
    needs: quality
    runs-on: ubuntu-latest

    env:
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT != '' && secrets.HOSTINGER_SSH_PORT || '65002' }}
      DEPLOY_PATH: ${{ secrets.HOSTINGER_PATH }}
      SSH_TARGET: ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, mbstring, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build release
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          npm ci
          npm run build

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.HOSTINGER_HOST }}" || (echo "::error::Missing secret HOSTINGER_HOST" && exit 1)
          test -n "${{ secrets.HOSTINGER_USER }}" || (echo "::error::Missing secret HOSTINGER_USER" && exit 1)
          test -n "${{ secrets.HOSTINGER_SSH_KEY }}" || (echo "::error::Missing secret HOSTINGER_SSH_KEY" && exit 1)
          test -n "${DEPLOY_PATH}" || (echo "::error::Missing secret HOSTINGER_PATH" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add Hostinger to known hosts
        run: ssh-keyscan -p "${SSH_PORT}" -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -p "${SSH_PORT}" -o BatchMode=yes -o ConnectTimeout=20 "${SSH_TARGET}" \
            "cd '${DEPLOY_PATH}' && php artisan --version"

      - name: Backup production
        continue-on-error: true
        run: |
          ssh -p "${SSH_PORT}" -o BatchMode=yes "${SSH_TARGET}" \
            "cd '${DEPLOY_PATH}' && php artisan inmo:backup --keep=14"

      - name: Rsync to server
        run: |
          rsync -avz --delete \
            -e "ssh -p ${SSH_PORT} -o BatchMode=yes" \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'storage' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude '.env.example' \
            --exclude 'phpunit.xml' \
            --exclude 'compose.yaml' \
            --exclude 'docker' \
            --exclude 'inmo-deploy.tar.gz' \
            --exclude 'public/storage' \
            --exclude '.cursor' \
            --exclude 'docs' \
            ./ "${SSH_TARGET}:${DEPLOY_PATH}/"

      - name: Run migrations and warm caches
        run: |
          ssh -p "${SSH_PORT}" -o BatchMode=yes "${SSH_TARGET}" \
            "cd '${DEPLOY_PATH}' && php artisan migrate --force && (php artisan storage:link || true) && php artisan config:cache && php artisan route:cache && php artisan view:cache"
