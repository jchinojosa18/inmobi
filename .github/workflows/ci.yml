name: CI

on:
  push:
    branches:
      - "**"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, mbstring, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: composer test

      - name: Run Pint
        run: composer pint:test
